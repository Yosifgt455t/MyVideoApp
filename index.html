<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTX-2-3 Video App</title>
    
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // ضعي التوكن هنا بدلاً من الجملة العربية
        const HF_TOKEN = "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";

        window.generateVideo = async function() {
            const promptInput = document.getElementById('prompt');
            const status = document.getElementById('status');
            const videoContainer = document.getElementById('videoContainer');
            const btn = document.getElementById('genBtn');

            if (!promptInput.value.trim()) {
                alert("يرجى كتابة وصف للفيديو!");
                return;
            }

            try {
                btn.disabled = true;
                status.innerHTML = "⏳ جاري الاتصال بالمودل...";
                videoContainer.innerHTML = "";

                const client = await Client.connect("Lightricks/LTX-2-3", { hf_token: HF_TOKEN });

                const submission = client.submit("/generate_video", { 
                    prompt: promptInput.value,
                    input_image: null,
                    negative_prompt: "low quality",
                    duration: 3,
                    seed: 42,
                    randomize_seed: true,
                    guidance_scale: 3,
                    num_inference_steps: 40,
                    height: 1024,
                    width: 1216
                });

                for await (const message of submission) {
                    if (message.type === "status") {
                        status.innerHTML = `رقمك في الطابور: ${message.position || 'جاري المعالجة..'}`;
                    }
                    if (message.type === "data") {
                        const videoUrl = message.data[0].url;
                        videoContainer.innerHTML = `<video controls autoplay loop style="width:100%; border-radius:10px;"><source src="${videoUrl}"></video>`;
                        status.innerHTML = "✅ تم الانتهاء!";
                    }
                }
            } catch (e) {
                status.innerHTML = "❌ خطأ: " + e.message;
            } finally {
                btn.disabled = false;
            }
        };
    </script>

    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #222; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #ff4c4c; color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 90%; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #00ffcc; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#ff4c4c">LTX-2-3 Video Maker</h2>
    <input type="text" id="prompt" placeholder="اكتب وصف الفيديو هنا...">
    <button id="genBtn" onclick="generateVideo()">ابدأ الإنشاء</button>
    <div id="status"></div>
    <div id="videoContainer"></div>
</div>

</body>
</html>

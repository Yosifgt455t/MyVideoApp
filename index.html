<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinking AI Chatbot</title>
    
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // ==========================================
        // 1. ضع التوكن الخاص بك هنا
        const HF_TOKEN = "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"; 
        
        // 2. اسم الـ Space الجديد الذي اخترته
        const SPACE_ID = "TeichAI/Qwen3-4B-Thinking-2507-Claude-4.5-Opus";
        // ==========================================

        let chatHistory = []; // لحفظ سياق المحادثة

        window.sendMessage = async function() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return;

            // عرض رسالة المستخدم
            appendMessage("user", message);
            input.value = "";
            btn.disabled = true;

            // إضافة مكان لإجابة البوت مع علامة تحميل
            const botMsgDiv = appendMessage("bot", "جاري التفكير...");

            try {
                // الاتصال بالمودل
                const client = await Client.connect(SPACE_ID, { hf_token: HF_TOKEN });
                
                // إرسال الطلب للمودل (Qwen Thinking عادة يستخدم هذه المعايير)
                const result = await client.predict("/chat", { 
                    message: message,
                    history: chatHistory,
                    system_prompt: "أنت مساعد ذكي ومفكر. قدم إجابات دقيقة ومنطقية باللغة العربية.",
                });

                // الحصول على الإجابة وتحديث الواجهة
                // ملاحظة: المودل قد يعيد الإجابة في result.data[0]
                const response = result.data[0];
                botMsgDiv.innerText = response;

                // تحديث تاريخ المحادثة ليتذكر البوت ما قلته سابقاً
                chatHistory.push([message, response]);

            } catch (error) {
                console.error("Error:", error);
                botMsgDiv.innerText = "❌ حدث خطأ في الاتصال. تأكد أن المودل يعمل (Running) وأن التوكن صحيح.";
            } finally {
                btn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>

    <style>
        body { background: #0c0c0c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-card { width: 100%; max-width: 500px; height: 90vh; background: #161616; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #222; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #222; background: #1a1a1a; border-radius: 20px 20px 0 0; }
        .header h2 { margin: 0; color: #00d1ff; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; position: relative; }
        .user-message { align-self: flex-start; background: #00d1ff; color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-end; background: #222; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .input-group { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #0c0c0c; border: 1px solid #333; padding: 12px 15px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: #00d1ff; }
        button { background: #00d1ff; color: #000; border: none; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00b8e6; transform: translateY(-1px); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">
        <h2>Thinking AI 🧠</h2>
    </div>
    <div id="chatBox" class="chat-box">
        <div class="message bot-message">مرحباً! أنا مودل Qwen3 المتطور. اسألني أي شيء وسأفكر بعمق قبل الإجابة.</div>
    </div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
</div>

</body>
</html>
